spring.application.name=E-commerce_Application

server.port=8080

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ecommerce_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:Jairaj@0305}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=ecommerce-notification-group
spring.kafka.producer.acks=all

app.kafka.topics.order-events=order-events
app.security.admin-username=admin
app.security.admin-password=admin123
app.security.customer-username=customer
app.security.customer-password=customer123
app.jwt.secret=VGhpcy1pcy1hLXZlcnktbG9uZy1kZW1vLWp3dC1zZWNyZXQtZm9yLWVjb21tZXJjZQ==
app.jwt.expiration-minutes=120
app.openapi.title=E-Commerce API
app.openapi.description=Enterprise-style e-commerce backend with JWT, Kafka, Redis, and email workflows.
app.openapi.version=v1

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
